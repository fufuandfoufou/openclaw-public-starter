<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="720" fill="#0B1020"/>
  <text x="60" y="72" fill="#F8FAFC" font-size="36" font-family="Arial, Helvetica, sans-serif" font-weight="700">OpenClaw Public Starter</text>
  <text x="60" y="108" fill="#94A3B8" font-size="20" font-family="Arial, Helvetica, sans-serif">Public architecture, private secrets, reusable workspace templates</text>

  <rect x="60" y="160" width="320" height="180" rx="20" fill="#111827" stroke="#38BDF8" stroke-width="2"/>
  <text x="90" y="205" fill="#E2E8F0" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Public Repo</text>
  <text x="90" y="245" fill="#CBD5E1" font-size="20" font-family="Arial, Helvetica, sans-serif">• README (EN / zh-CN)</text>
  <text x="90" y="275" fill="#CBD5E1" font-size="20" font-family="Arial, Helvetica, sans-serif">• Templates</text>
  <text x="90" y="305" fill="#CBD5E1" font-size="20" font-family="Arial, Helvetica, sans-serif">• Example configs</text>
  <text x="90" y="335" fill="#CBD5E1" font-size="20" font-family="Arial, Helvetica, sans-serif">• Bootstrap / validation scripts</text>

  <rect x="440" y="160" width="320" height="180" rx="20" fill="#111827" stroke="#34D399" stroke-width="2"/>
  <text x="470" y="205" fill="#E2E8F0" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Private Local Layer</text>
  <text x="470" y="245" fill="#CBD5E1" font-size="20" font-family="Arial, Helvetica, sans-serif">• .env</text>
  <text x="470" y="275" fill="#CBD5E1" font-size="20" font-family="Arial, Helvetica, sans-serif">• openclaw.json</text>
  <text x="470" y="305" fill="#CBD5E1" font-size="20" font-family="Arial, Helvetica, sans-serif">• Memory / runtime state</text>
  <text x="470" y="335" fill="#CBD5E1" font-size="20" font-family="Arial, Helvetica, sans-serif">• Real channel bindings</text>

  <rect x="820" y="160" width="320" height="180" rx="20" fill="#111827" stroke="#F59E0B" stroke-width="2"/>
  <text x="850" y="205" fill="#E2E8F0" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Optional Private Repo</text>
  <text x="850" y="245" fill="#CBD5E1" font-size="20" font-family="Arial, Helvetica, sans-serif">• Personal overlays</text>
  <text x="850" y="275" fill="#CBD5E1" font-size="20" font-family="Arial, Helvetica, sans-serif">• Versioned private config</text>
  <text x="850" y="305" fill="#CBD5E1" font-size="20" font-family="Arial, Helvetica, sans-serif">• Team-specific notes</text>

  <rect x="120" y="430" width="960" height="180" rx="24" fill="#0F172A" stroke="#64748B" stroke-width="2"/>
  <text x="160" y="480" fill="#F8FAFC" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Design Principles</text>
  <text x="160" y="525" fill="#CBD5E1" font-size="22" font-family="Arial, Helvetica, sans-serif">1. Public repo contains templates, docs, and safe examples only</text>
  <text x="160" y="560" fill="#CBD5E1" font-size="22" font-family="Arial, Helvetica, sans-serif">2. Secrets always come from local environment variables</text>
  <text x="160" y="595" fill="#CBD5E1" font-size="22" font-family="Arial, Helvetica, sans-serif">3. Memory, logs, IDs, and runtime state never go into public Git</text>

  <path d="M380 250H440" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
  <path d="M760 250H820" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
</svg>
